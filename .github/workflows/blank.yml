name: Build MyCustomOCR EXE

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        # הסרנו את ה-cache שגרם לשגיאה

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # התקנת הספריות ישירות
        pip install torch==2.3.1 torchvision==0.18.1 --index-url https://download.pytorch.org/whl/cpu
        pip install onnx onnxruntime==1.18.1 opencv-python albumentations pandas PyQt6 Pillow numpy jiwer pyinstaller

    - name: Create Missing Folders
      run: |
        # יצירת התיקיות במידה והן לא קיימות כדי ש-PyInstaller לא יקרוס
        mkdir -p weights
        mkdir -p checkpoints
        mkdir -p data
        echo "placeholder" > data/placeholder.txt

    - name: Build EXE with PyInstaller
      run: |
        pyinstaller --noconfirm --onedir --windowed `
          --name "MyCustomOCR" `
          --add-data "data;data" `
          --add-data "weights;weights" `
          --add-data "checkpoints;checkpoints" `
          --hidden-import onnxruntime `
          --hidden-import cv2 `
          --hidden-import albumentations `
          --hidden-import pandas `
          --hidden-import torch `
          --hidden-import torchvision `
          --exclude-module onnx.reference `
          gui/app.py

    - name: Upload Finished EXE
      uses: actions/upload-artifact@v4
      with:
        name: MyCustomOCR-Windows-Build
        path: dist/MyCustomOCR/
