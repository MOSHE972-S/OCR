name: Build and Release OCR (Folder Mode)

on:
  workflow_dispatch: # הפעלה ידנית בלבד כדי לשלוט בגרסאות

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Python Setup
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install Dependencies
      run: |
        pip install --upgrade pip
        pip install torch==2.3.1 torchvision==0.18.1 --index-url https://download.pytorch.org/whl/cpu
        pip install onnx onnxruntime==1.18.1 opencv-python albumentations pandas PyQt6 Pillow numpy jiwer pyinstaller

    - name: Build EXE (Folder Mode)
      run: |
        # משתמשים ב-onedir כדי לשמור על מהירות פתיחה
        pyinstaller --noconfirm --onedir --windowed --name "MyOCR_App" --add-data "gui;gui" --hidden-import onnxruntime --hidden-import torch gui/app.py

    - name: Zip the Output Folder
      run: |
        # כאן קורה הקסם: דוחסים את כל התיקייה לקובץ אחד בשביל הורדה מהירה
        powershell Compress-Archive -Path dist/MyOCR_App -DestinationPath MyOCR_Package.zip

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: MyOCR_Package.zip
        tag_name: v1.0.${{ github.run_number }}
        name: Release v1.0.${{ github.run_number }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
