name: PyInstaller Fast Build # שם שונה כדי שלא יבטל את הריצה הקודמת

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    env:
      PYTHONIOENCODING: utf-8

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Python Setup
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Pre-Build Setup
      run: mkdir -p data weights checkpoints

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install torch==2.3.1 torchvision==0.18.1 --index-url https://download.pytorch.org/whl/cpu
        pip install onnxruntime==1.18.1 opencv-python-headless pandas PyQt6 Pillow numpy jiwer pyinstaller albumentations

    - name: Build EXE
      run: |
        pyinstaller --noconfirm --onedir --windowed `
        --name "MyCustomOCR_Fast" `
        --add-data "data;data" `
        --add-data "weights;weights" `
        --add-data "checkpoints;checkpoints" `
        --hidden-import onnxruntime `
        --hidden-import cv2 `
        --hidden-import albumentations `
        --hidden-import pandas `
        --hidden-import torch `
        --hidden-import torchvision `
        gui/app.py

    - name: Zip
      shell: powershell
      run: Compress-Archive -Path dist/MyCustomOCR_Fast -DestinationPath MyOCR_Fast_Windows.zip

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: MyOCR_Fast_Windows.zip
        tag_name: fast-v1.0.${{ github.run_number }}
        name: Fast PyInstaller Release ${{ github.run_number }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
