name: Ultra-Light Release Build

on:
  workflow_dispatch:

permissions:
  contents: write 

jobs:
  build:
    runs-on: windows-latest
    env:
      PYTHONUTF8: 1
      ORT_LOGGING_LEVEL: 3 # מונע קריסות לוגים של ONNX בזמן הבנייה

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install UPX (For binary compression)
      run: choco install upx -y

    - name: Create Required Folders
      shell: powershell
      run: |
        New-Item -ItemType Directory -Force -Path data/raw_scans, data/processed, src, gui, weights, checkpoints

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        # מונע התנגשויות גרסאות של Numpy
        pip install "numpy<2.0.0"
        # התקנת גרסאות CPU כדי לחסוך גיגה-בייטים של משקל
        pip install torch==2.3.1 torchvision==0.18.1 --index-url https://download.pytorch.org/whl/cpu
        pip install onnxruntime==1.18.1 onnx opencv-python-headless albumentations pandas PyQt6 Pillow jiwer pyinstaller

    - name: Build EXE (PyInstaller Fixed)
      shell: powershell
      run: |
        # פותר את בעיית ה-ModuleNotFoundError עבור התיקייה gui
        $env:PYTHONPATH = "."
        
        # בנייה עם PyInstaller שכוללת את כל התיקונים
        pyinstaller --noconfirm --onedir --windowed `
        --name "MyCustomOCR" `
        --add-data "data;data" `
        --add-data "weights;weights" `
        --add-data "checkpoints;checkpoints" `
        --collect-binaries onnxruntime `
        --exclude-module matplotlib `
        --exclude-module notebook `
        --hidden-import gui `
        --hidden-import torch `
        --paths "." `
        gui/app.py

    - name: Ultra-Compress with 7-Zip
      shell: powershell
      run: |
        # מוודא שהבנייה הצליחה לפני שהוא דוחס
        if (Test-Path dist/MyCustomOCR) {
            & "C:\Program Files\7-Zip\7z.exe" a -tzip -mx=9 MyOCR_Windows.zip .\dist\MyCustomOCR\*
        } else {
            Write-Error "❌ Build failed - dist/MyCustomOCR folder not found!"
            exit 1
        }

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: MyOCR_Windows.zip
        tag_name: v3.0.${{ github.run_number }}
        name: OCR Ultra-Light Release v3.0.${{ github.run_number }}
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
