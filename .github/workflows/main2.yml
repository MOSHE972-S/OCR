name: Ultra-Light Release Build

on:
  workflow_dispatch: # מאפשר הפעלה ידנית בלבד

permissions:
  contents: write 

jobs:
  build:
    runs-on: windows-latest
    env:
      PYTHONUTF8: 1 # פותר את בעיות הקידוד בעברית

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Create Required Folders
      shell: bash
      run: |
        mkdir -p data/raw_scans data/processed src gui weights checkpoints

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        # PyTorch למעבד (חוסך 2.5GB!) + OpenCV ללא GUI למניעת התנגשות עם PyQt6
        pip install torch==2.3.1 torchvision==0.18.1 --index-url https://download.pytorch.org/whl/cpu
        pip install onnxruntime==1.18.1 onnx opencv-python-headless albumentations pandas PyQt6 Pillow numpy jiwer pyinstaller

    - name: Patch Scripts (Fix Crash & Sys Path)
      shell: python
      # מתקן אוטומטית את ניתוב התיקיות באפליקציה ואת שגיאות הקריסה של PyInstaller
      run: |
        import os
        
        # 1. תיקון קובץ הבנייה - מונע את קריסת ONNX ומבטל UPX שמשחית קבצי AI
        if os.path.exists("build_exe.py"):
            with open("build_exe.py", "r", encoding="utf-8") as f:
                code = f.read()
            code = code.replace("upx=True", "upx=False")
            code = code.replace("excludes=[", "excludes=
