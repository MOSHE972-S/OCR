name: OCR-Ultra-Build-100-Percent

on:
  workflow_dispatch:

permissions:
  contents: write 

jobs:
  build:
    runs-on: windows-latest
    env:
      PYTHONUTF8: 1
      # מונע מ-PyInstaller לפתוח תהליכים צדדיים שקורסים
      PYINSTALLER_NO_SUBPROCESS: 1 

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Create Folders
      shell: powershell
      run: |
        New-Item -ItemType Directory -Force -Path data, weights, checkpoints, gui

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install "numpy<2.0.0"
        pip install torch==2.3.1 torchvision==0.18.1 --index-url https://download.pytorch.org/whl/cpu
        pip install onnxruntime==1.18.1 onnx opencv-python-headless albumentations pandas PyQt6 Pillow jiwer pyinstaller

    - name: Build EXE (Sledgehammer Mode)
      shell: powershell
      run: |
        $env:PYTHONPATH = "."
        
        # בנייה עם חסימה מוחלטת לכל המודולים שקורסים ב-GitHub
        pyinstaller --noconfirm --onedir --windowed `
        --name "MyCustomOCR" `
        --add-data "data;data" `
        --add-data "weights;weights" `
        --add-data "checkpoints;checkpoints" `
        --collect-binaries onnxruntime `
        --collect-binaries onnx `
        --exclude-module onnxruntime.quantization `
        --exclude-module onnxruntime.transformers `
        --exclude-module onnxruntime.datasets `
        --exclude-module onnx.reference `
        --exclude-module torch.distributed `
        --exclude-module torch.utils.tensorboard `
        --exclude-module matplotlib `
        --exclude-module notebook `
        --exclude-module scipy.spatial.tests `
        --exclude-module tkinter `
        --exclude-module unittest `
        --hidden-import gui `
        --paths "." `
        --noupx `
        gui/app.py

    - name: Compress & Release
      shell: powershell
      run: |
        if (Test-Path dist/MyCustomOCR) {
            & "C:\Program Files\7-Zip\7z.exe" a -tzip -mx=9 MyOCR_Final.zip .\dist\MyCustomOCR\*
        } else {
            Write-Error "Build failed!"
            exit 1
        }

    - name: Upload to Github Releases
      uses: softprops/action-gh-release@v2
      with:
        files: MyOCR_Final.zip
        tag_name: v5.0.${{ github.run_number }}
        name: OCR Release v5.0.${{ github.run_number }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
